<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #0d4f8b 0%, #1673c7 45%, #eaf4ff 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .phone-shell {
      width: 100%;
      max-width: 390px;
    }

    .login-card {
      background: #ffffff;
      border-radius: 28px;
      padding: 32px 24px 24px;
      box-shadow: 0 18px 40px rgba(8, 35, 64, 0.22);
      overflow: hidden;
      position: relative;
    }

    .top-band {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 94px;
      background: linear-gradient(90deg, #0c4c85 0%, #1d84dc 100%);
      border-bottom-left-radius: 26px;
      border-bottom-right-radius: 26px;
    }

    .logo-wrap {
      position: relative;
      z-index: 2;
      width: 82px;
      height: 82px;
      border-radius: 50%;
      margin: 10px auto 18px;
      background: #ffffff;
      box-shadow: 0 8px 20px rgba(9, 51, 92, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid #eef7ff;
    }

    .logo-inner {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0b4a80, #1f86dd);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
    }

    .title {
      position: relative;
      z-index: 2;
      text-align: center;
      font-size: 25px;
      font-weight: 700;
      color: #0f2d4c;
      margin-bottom: 6px;
    }

    .subtitle {
      position: relative;
      z-index: 2;
      text-align: center;
      color: #6b7b8c;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .input-group {
      margin-bottom: 14px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #19456d;
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .input-group input {
      width: 100%;
      border: 1px solid #d8e5f1;
      background: #f8fbff;
      border-radius: 16px;
      padding: 15px 14px;
      font-size: 15px;
      color: #12304e;
      outline: none;
      transition: 0.2s ease;
    }

    .input-group input:focus {
      border-color: #1d84dc;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(29, 132, 220, 0.10);
    }

    .extras {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 6px 2px 16px;
      gap: 10px;
      font-size: 12px;
      color: #5f7184;
    }

    .extras a {
      color: #1673c7;
      text-decoration: none;
      font-weight: 700;
    }

    .login-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 15px;
      background: linear-gradient(90deg, #0b4a80 0%, #1e84db 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(19, 93, 155, 0.18);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .login-btn:hover {
      opacity: 0.97;
      transform: translateY(-1px);
    }

    .message {
      min-height: 20px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      margin-top: 14px;
    }

    .bottom-tools {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .tool-card {
      background: #f6fbff;
      border: 1px solid #dcebf8;
      border-radius: 16px;
      padding: 14px 10px;
      text-align: center;
      color: #1c4d78;
      font-size: 13px;
      font-weight: 700;
    }

    .footer-note {
      text-align: center;
      margin-top: 16px;
      color: #e7f2ff;
      font-size: 12px;
      font-weight: 600;
    }

    @media (max-width: 420px) {
      .login-card {
        padding: 28px 18px 20px;
      }

      .title {
        font-size: 23px;
      }
    }
  </style>
</head>
<body>
  <div class="phone-shell">
    <div class="login-card">
      <div class="top-band"></div>

      <div class="logo-wrap">
        <div class="logo-inner">B</div>
      </div>

      <h1 class="title">Secure Login</h1>
      <p class="subtitle">Welcome back. Sign in to continue.</p>

      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" maxlength="30" />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" maxlength="64" />
      </div>

      <div class="extras">
        <span>Protected session</span>
        <a href="#">Forgot details?</a>
      </div>

      <button class="login-btn" onclick="login()">Login</button>

      <div id="message" class="message"></div>

      <div class="bottom-tools">
        <div class="tool-card">Quick Access</div>
        <div class="tool-card">Help Centre</div>
      </div>
    </div>

    <div class="footer-note">Custom banking-style login</div>
  </div>

  <script>
    function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("message");

      if (username === "admin" && password === "SecurePass123") {
        message.style.color = "#149c55";
        message.textContent = "Login successful";
      } else {
        message.style.color = "#d62828";
        message.textContent = "Invalid username or password";
      }
    }
  </script>
</body>
</html>
