<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Secure Login</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  font-family: Arial, sans-serif;

  /* 🔥 BANKING BACKGROUND */
  background: 
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
    url("https://images.unsplash.com/photo-1556742049-0cfed4f6a45d");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* CARD */
.login-card {
  width: 100%;
  max-width: 380px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(6px);
  border-radius: 24px;
  padding: 30px 24px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  text-align: center;
}

/* ICON */
.bank-icon {
  width: 80px;
  height: 80px;
  margin: 0 auto 18px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00a651, #1f6fb2);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 32px;
  color: white;
}

/* TEXT */
.title {
  font-size: 24px;
  font-weight: bold;
  color: #0b1f3a;
}

.subtitle {
  font-size: 14px;
  color: #555;
  margin: 10px 0 20px;
}

/* INPUT */
.input-group {
  text-align: left;
  margin-bottom: 15px;
}

.input-group label {
  font-size: 13px;
  font-weight: bold;
}

.input-group input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin-top: 5px;
}

/* BUTTON */
.login-btn {
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #0b1f3a, #1f6fb2);
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

.login-btn:hover {
  opacity: 0.95;
}

/* MESSAGE */
.message {
  margin-top: 12px;
  font-size: 13px;
  font-weight: bold;
}

.footer {
  text-align: center;
  margin-top: 15px;
  color: #ddd;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="login-card">

  <div class="bank-icon">🏦</div>

  <div class="title">Secure Login</div>
  <div class="subtitle">Access your account safely</div>

  <div class="input-group">
    <label>Username</label>
    <input type="text" id="username" maxlength="30">
  </div>

  <div class="input-group">
    <label>Password</label>
    <input type="password" id="password" maxlength="64">
  </div>

  <button class="login-btn" onclick="login()">Login</button>

  <div id="msg" class="message"></div>

</div>

<div class="footer">
  Protected banking environment
</div>

<script>
function login() {
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  if (user === "admin" && pass === "SecurePass123") {
    msg.style.color = "#00a651";
    msg.innerText = "Login successful";
  } else {
    msg.style.color = "red";
    msg.innerText = "Invalid credentials";
  }
}
</script>

</body>
</html>
