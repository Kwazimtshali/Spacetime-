<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0b1f3a 0%, #0f3b6d 45%, #1f6fb2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-wrapper {
      width: 100%;
      max-width: 380px;
    }

    .login-card {
      background: #ffffff;
      border-radius: 24px;
      padding: 30px 24px 24px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    .bank-icon {
      width: 84px;
      height: 84px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00a651 0%, #1f6fb2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(31, 111, 178, 0.25);
    }

    .bank-icon span {
      font-size: 34px;
      color: #fff;
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      color: #0b1f3a;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .input-group {
      text-align: left;
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #0b1f3a;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 14px;
      border: 1px solid #d7deea;
      border-radius: 14px;
      font-size: 15px;
      background: #f8fafc;
      outline: none;
      transition: 0.2s ease;
    }

    .input-group input:focus {
      border-color: #1f6fb2;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(31, 111, 178, 0.12);
    }

    .login-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(90deg, #0b1f3a 0%, #1f6fb2 100%);
      cursor: pointer;
      margin-top: 6px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .login-btn:hover {
      opacity: 0.96;
      transform: translateY(-1px);
    }

    .helper-row {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 13px;
    }

    .helper-row a {
      color: #1f6fb2;
      text-decoration: none;
      font-weight: 700;
    }

    .message {
      margin-top: 14px;
      min-height: 20px;
      font-size: 13px;
      font-weight: 700;
    }

    .footer-note {
      text-align: center;
      margin-top: 18px;
      color: #eaf2ff;
      font-size: 12px;
    }

    @media (max-width: 420px) {
      .login-card {
        padding: 26px 18px 20px;
        border-radius: 20px;
      }

      .title {
        font-size: 23px;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="bank-icon">
        <span>🏦</span>
      </div>

      <h1 class="title">Secure Login</h1>
      <p class="subtitle">Sign in to access your profile and continue safely.</p>

      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" />
      </div>

      <button class="login-btn" onclick="login()">Login</button>

      <div id="message" class="message"></div>

      <div class="helper-row">
        <a href="#">Forgot Username</a>
        <a href="#">Forgot Password</a>
      </div>
    </div>

    <div class="footer-note">
      Protected access portal
    </div>
  </div>

  <script>
    function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("message");

      if (username === "admin" && password === "1234") {
        message.style.color = "#00a651";
        message.textContent = "Login successful";
      } else {
        message.style.color = "#dc2626";
        message.textContent = "Invalid username or password";
      }
    }
  </script>
</body>
</html>
