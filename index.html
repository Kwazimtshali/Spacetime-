<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank App Mockup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
    body {
      background: #efefef;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .phone {
      width: 390px;
      min-height: 844px;
      background: #f3f3f3;
      position: relative;
      overflow: hidden;
    }

    .status-bar {
      height: 42px;
      padding: 12px 18px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #5f5f5f;
      font-size: 13px;
    }
    .status-left, .status-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot-bar {
      display: flex;
      gap: 2px;
      align-items: end;
    }
    .dot-bar span {
      display: block;
      width: 3px;
      background: #5e5e5e;
      border-radius: 2px;
    }
    .dot-bar span:nth-child(1){height:8px}
    .dot-bar span:nth-child(2){height:11px}
    .dot-bar span:nth-child(3){height:15px}
    .dot-bar span:nth-child(4){height:18px}

    .header {
      padding: 30px 28px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #111;
    }
    .header .brand {
      font-size: 25px;
      font-weight: 500;
      letter-spacing: 0.4px;
    }
    .qr {
      width: 34px;
      height: 34px;
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
    }
    .qr span {
      border: 3px solid #111;
      border-radius: 2px;
    }

    .hero {
      height: 218px;
      background: linear-gradient(135deg, #8acfd2 0%, #a4dde0 45%, #57b9c2 100%);
      position: relative;
      overflow: hidden;
      border-top: 1px solid rgba(0,0,0,0.05);
    }
    .hero-inner {
      position: absolute;
      inset: 0;
      padding: 18px 16px;
    }
    .speedpoint-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: 8px;
      color: #111;
      font-weight: 700;
      font-size: 20px;
    }
    .speed-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #f0b12f;
      border: 4px solid #0da6b2;
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .speed-icon::before {
      content: "";
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 4px solid #111;
      border-top-color: transparent;
      border-left-color: transparent;
      transform: rotate(45deg);
      position: absolute;
    }
    .speed-stripe {
      width: 28px;
      height: 18px;
      background: linear-gradient(135deg, #0c95a5 0%, #0c95a5 50%, #f4a732 50%, #f4a732 100%);
      transform: skewX(-28deg);
      border-radius: 3px;
      margin-left: 2px;
    }
    .ad-card {
      position: absolute;
      left: 14px;
      top: 92px;
      width: 255px;
      height: 140px;
      border-radius: 22px;
      border: 3px solid #269fb0;
      background: linear-gradient(90deg, rgba(6,167,192,0.9) 0%, rgba(168,234,238,0.85) 100%);
      padding: 18px 20px;
      box-shadow: inset 0 0 28px rgba(255,255,255,0.2);
    }
    .ad-card h2 {
      font-size: 28px;
      line-height: 1.08;
      font-weight: 400;
      color: #050505;
    }
    .ad-card h2 strong {
      font-size: 33px;
      font-weight: 800;
    }
    .device-stack {
      position: absolute;
      right: -6px;
      top: 18px;
      width: 215px;
      height: 190px;
    }
    .tablet, .terminal, .phone-card, .dashboard {
      position: absolute;
      border-radius: 12px;
      background: #f5f7f8;
      border: 2px solid #1d2f35;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    }
    .tablet {
      width: 150px;
      height: 92px;
      right: 25px;
      top: 8px;
      transform: rotate(-9deg);
    }
    .tablet::before, .tablet::after, .dashboard::before, .terminal::before, .phone-card::before {
      content: "";
      position: absolute;
      inset: 9px;
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff, #edf2f4);
    }
    .dashboard {
      width: 125px;
      height: 90px;
      right: 4px;
      bottom: 0;
      transform: rotate(3deg);
    }
    .terminal {
      width: 54px;
      height: 100px;
      right: 107px;
      bottom: 4px;
      transform: rotate(-7deg);
    }
    .phone-card {
      width: 45px;
      height: 86px;
      right: 148px;
      bottom: 2px;
      transform: rotate(12deg);
    }
    .mini-printer {
      position: absolute;
      width: 46px;
      height: 22px;
      right: 14px;
      top: 108px;
      border-radius: 8px;
      background: #0da6b2;
      border: 2px solid #1d2f35;
      transform: rotate(-14deg);
    }
    .checkout {
      position: absolute;
      right: 16px;
      top: 120px;
      background: #ea9a21;
      color: #fff;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 4px;
      font-weight: 700;
      transform: rotate(-7deg);
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .content {
      padding: 18px 18px 138px;
    }
    .search-box {
      height: 72px;
      background: #fff;
      border: 2px solid #d3d3d3;
      border-radius: 28px;
      display: flex;
      align-items: center;
      overflow: hidden;
      margin-bottom: 26px;
    }
    .search-icon {
      width: 94px;
      height: 100%;
      background: #0ca7ab;
      display: grid;
      place-items: center;
      border-top-right-radius: 18px;
      border-bottom-right-radius: 18px;
      border-right: 1px solid rgba(255,255,255,0.4);
    }
    .magnifier {
      width: 33px;
      height: 33px;
      border: 4px solid #ffffff;
      border-radius: 50%;
      position: relative;
    }
    .magnifier::after {
      content: "";
      position: absolute;
      width: 15px;
      height: 4px;
      background: #fff;
      border-radius: 4px;
      right: -9px;
      bottom: -2px;
      transform: rotate(45deg);
    }
    .search-text {
      color: #777;
      font-size: 29px;
      padding-left: 24px;
      font-weight: 400;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px 18px;
    }
    .feature {
      text-align: center;
      color: #111;
    }
    .feature-box {
      width: 94px;
      height: 94px;
      margin: 0 auto 12px;
      background: #fff;
      border: 2px solid #dadada;
      border-radius: 22px;
      display: grid;
      place-items: center;
    }
    .feature-label {
      font-size: 22px;
      line-height: 1.1;
      font-weight: 400;
    }

    .ico {
      position: relative;
      width: 40px;
      height: 40px;
    }
    .orange { color: #ef8f20; border-color: #ef8f20; }
    .teal { color: #13a6ab; border-color: #13a6ab; }

    .lock::before {
      content: "";
      position: absolute;
      width: 26px;
      height: 20px;
      border: 4px solid #ef8f20;
      border-radius: 4px;
      left: 7px;
      bottom: 4px;
    }
    .lock::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 16px;
      border: 4px solid #ef8f20;
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      left: 11px;
      top: 1px;
    }

    .message::before {
      content: "";
      position: absolute;
      inset: 8px 4px 10px 4px;
      border: 4px solid #13a6ab;
      border-radius: 12px;
    }
    .message::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      border-left: 4px solid #13a6ab;
      border-bottom: 4px solid #13a6ab;
      bottom: 3px;
      left: 11px;
      transform: skewX(-18deg) rotate(-4deg);
      background: transparent;
    }

    .cart::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 12px;
      width: 24px;
      height: 14px;
      border: 4px solid #ef8f20;
      border-top: none;
      transform: skewX(-10deg);
    }
    .cart::after {
      content: "";
      position: absolute;
      left: 3px;
      top: 7px;
      width: 10px;
      height: 4px;
      background: #ef8f20;
      border-radius: 4px;
      box-shadow: 12px 22px 0 0 #ef8f20, 26px 22px 0 0 #ef8f20;
    }

    .hand::before {
      content: "";
      position: absolute;
      left: 5px;
      top: 19px;
      width: 26px;
      height: 12px;
      border: 4px solid #13a6ab;
      border-top: none;
      border-right: none;
      border-radius: 0 0 0 12px;
      transform: skewX(-18deg);
    }
    .hand::after {
      content: "";
      position: absolute;
      right: 2px;
      top: 8px;
      width: 11px;
      height: 18px;
      border: 4px solid #13a6ab;
      border-radius: 4px;
      box-shadow: -16px 6px 0 -2px rgba(0,0,0,0);
    }

    .transfer::before, .transfer::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border-top: 4px solid #13a6ab;
      border-right: 4px solid #13a6ab;
    }
    .transfer::before {
      top: 1px;
      right: 6px;
      transform: rotate(45deg);
    }
    .transfer::after {
      bottom: 1px;
      left: 6px;
      transform: rotate(-135deg);
    }

    .gift::before {
      content: "";
      position: absolute;
      inset: 13px 6px 5px;
      border: 4px solid #ef8f20;
      border-top: none;
      border-radius: 2px;
    }
    .gift::after {
      content: "";
      position: absolute;
      left: 6px;
      top: 13px;
      width: 28px;
      height: 4px;
      background: #ef8f20;
      box-shadow: 12px 0 0 0 #ef8f20;
    }
    .gift .bow-left, .gift .bow-right, .gift .ribbon {
      position: absolute;
      display: block;
    }
    .gift .bow-left {
      width: 12px;
      height: 10px;
      border: 4px solid #ef8f20;
      border-radius: 12px 12px 0 12px;
      top: 2px;
      left: 8px;
      border-bottom: none;
      transform: rotate(-16deg);
    }
    .gift .bow-right {
      width: 12px;
      height: 10px;
      border: 4px solid #ef8f20;
      border-radius: 12px 12px 12px 0;
      top: 2px;
      right: 8px;
      border-bottom: none;
      transform: rotate(16deg);
    }
    .gift .ribbon {
      width: 4px;
      height: 28px;
      background: #ef8f20;
      left: 18px;
      top: 12px;
    }

    .voucher::before {
      content: "%";
      position: absolute;
      font-size: 28px;
      font-weight: 700;
      color: #13a6ab;
      inset: 5px 0 0 0;
      text-align: center;
    }
    .voucher::after {
      content: "";
      position: absolute;
      inset: 7px 3px;
      border: 4px solid #13a6ab;
      border-radius: 8px;
      clip-path: polygon(0 0, 100% 0, 100% 34%, 90% 50%, 100% 66%, 100% 100%, 0 100%, 0 66%, 10% 50%, 0 34%);
    }

    .insure::before {
      content: "";
      position: absolute;
      inset: 5px;
      border: 4px solid #13a6ab;
      border-radius: 50%;
    }
    .insure::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 4px solid #13a6ab;
      left: 9px;
      top: 9px;
      box-shadow: 16px 0 0 -4px #fff, 16px 0 0 4px #13a6ab, 8px 16px 0 -4px #fff, 8px 16px 0 4px #13a6ab;
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: #fff;
      border-top: 1px solid #d7d7d7;
      padding: 12px 10px 18px;
    }
    .indicator {
      position: absolute;
      top: 0;
      left: 0;
      width: 74px;
      height: 4px;
      background: #111;
      border-radius: 0 0 4px 0;
    }
    .nav-items {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: end;
      text-align: center;
      gap: 8px;
    }
    .nav-item {
      color: #111;
      font-size: 16px;
    }
    .nav-icon {
      width: 34px;
      height: 34px;
      margin: 0 auto 8px;
      position: relative;
    }
    .home-icon::before {
      content: "";
      position: absolute;
      width: 20px;
      height: 18px;
      border: 3px solid #111;
      border-top: none;
      left: 7px;
      bottom: 4px;
    }
    .home-icon::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border-left: 3px solid #111;
      border-top: 3px solid #111;
      transform: rotate(45deg);
      left: 8px;
      top: 4px;
      background: #fff;
    }
    .card-icon::before {
      content: "";
      position: absolute;
      inset: 6px 3px 9px;
      border: 3px solid #111;
      border-radius: 5px;
    }
    .card-icon::after {
      content: "";
      position: absolute;
      left: 7px;
      right: 7px;
      top: 13px;
      height: 3px;
      background: #111;
    }
    .chat-icon::before {
      content: "";
      position: absolute;
      inset: 7px 4px 10px;
      border: 3px solid #111;
      border-radius: 8px;
    }
    .chat-icon::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      border-left: 3px solid #111;
      border-bottom: 3px solid #111;
      bottom: 5px;
      left: 10px;
      transform: skewX(-18deg);
      background: #fff;
    }
    .profile-icon::before {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border: 3px solid #111;
      border-radius: 50%;
      left: 9px;
      top: 3px;
    }
    .profile-icon::after {
      content: "";
      position: absolute;
      width: 24px;
      height: 13px;
      border: 3px solid #111;
      border-radius: 14px 14px 8px 8px;
      left: 3px;
      bottom: 4px;
    }
    .menu-icon::before, .menu-icon::after, .menu-icon span {
      content: "";
      position: absolute;
      left: 2px;
      right: 2px;
      height: 3px;
      background: #111;
      border-radius: 4px;
    }
    .menu-icon::before { top: 8px; }
    .menu-icon span { top: 16px; }
    .menu-icon::after { top: 24px; }
    .nav-text {
      font-size: 18px;
      white-space: nowrap;
    }

    @media (max-width: 430px) {
      .phone {
        width: 100vw;
        min-height: 100vh;
      }
      .feature-box {
        width: 88px;
        height: 88px;
      }
      .feature-label { font-size: 20px; }
      .search-text { font-size: 26px; }
      .nav-text { font-size: 16px; }
    }
  </style>
</head>
<body>
      <div class="header">
      <div class="brand">FNB</div>
      <div class="qr"><span></span><span></span><span></span><span></span></div>
    </div>

    <section class="hero">
      <div class="hero-inner">
        <div class="speedpoint-logo">
          <div class="speed-icon"></div>
          <div style="width:2px;height:34px;background:rgba(0,0,0,0.35);"></div>
          <div class="speed-stripe"></div>
          <div style="margin-left:-2px;">Speedpoint<sup style="font-size:11px;">®</sup></div>
        </div>

        <div class="ad-card">
          <h2>Introducing<br>our <strong>NEW</strong><br><strong style="font-size:31px;">Speedpoint</strong><sup style="font-size:14px;">®</sup><br>range</h2>
        </div>

        <div class="device-stack">
          <div class="tablet"></div>
          <div class="phone-card"></div>
          <div class="terminal"></div>
          <div class="dashboard"></div>
          <div class="mini-printer"></div>
          <div class="checkout">Checkout R35.00</div>
        </div>
      </div>
    </section>

    <div class="content">
      <div class="search-box">
        <div class="search-icon"><div class="magnifier"></div></div>
        <div class="search-text">How can we help you?</div>
      </div>

      <div class="grid">
        <div class="feature">
          <div class="feature-box"><div class="ico lock"></div></div>
          <div class="feature-label">Login</div>
        </div>

        <div class="feature">
          <div class="feature-box"><div class="ico message"></div></div>
          <div class="feature-label">Message</div>
        </div>

        <div class="feature">
          <div class="feature-box"><div class="ico cart"></div></div>
          <div class="feature-label">Product<br>Shop</div>
        </div>

        <div class="feature">
          <div class="feature-box"><div class="ico hand"></div></div>
          <div class="feature-label">Pay</div>
        </div>

        <div class="feature">
          <div class="feature-box"><div class="ico transfer"></div></div>
          <div class="feature-label">Transfer</div>
        </div>

        <div class="feature">
          <div class="feature-box">
            <div class="ico gift">
              <span class="bow-left"></span>
              <span class="bow-right"></span>
              <span class="ribbon"></span>
            </div>
          </div>
          <div class="feature-label">Buy + Gift</div>
        </div>

        <div class="feature">
          <div class="feature-box"><div class="ico voucher"></div></div>
          <div class="feature-label">Vouchers</div>
        </div>

        <div class="feature">
          <div class="feature-box"><div class="ico insure"></div></div>
          <div class="feature-label">Insure</div>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
      <div class="indicator"></div>
      <div class="nav-items">
        <div class="nav-item">
          <div class="nav-icon home-icon"></div>
          <div class="nav-text">Home</div>
        </div>
        <div class="nav-item">
          <div class="nav-icon card-icon"></div>
          <div class="nav-text">Bank</div>
        </div>
        <div class="nav-item">
          <div class="nav-icon chat-icon"></div>
          <div class="nav-text">Message</div>
        </div>
        <div class="nav-item">
          <div class="nav-icon profile-icon"></div>
          <div class="nav-text">My profile</div>
        </div>
        <div class="nav-item">
          <div class="nav-icon menu-icon"><span></span></div>
          <div class="nav-text">Menu</div>
        </div>
      </div>
    </nav>
  </div>
</body>
</html>
