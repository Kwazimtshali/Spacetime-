<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(rgba(5, 18, 35, 0.70), rgba(5, 18, 35, 0.82)),
        url("https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=1400&q=80");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* animated cyber grid */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 190, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 190, 255, 0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 18s linear infinite;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(0,166,81,0.18), transparent 60%);
      top: -180px;
      right: -160px;
      animation: pulseGlow 5s ease-in-out infinite;
      pointer-events: none;
    }

    .floating-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(10px);
      opacity: 0.35;
      pointer-events: none;
    }

    .orb1 {
      width: 150px;
      height: 150px;
      background: #1f86dd;
      bottom: 8%;
      left: 8%;
      animation: floatOne 8s ease-in-out infinite;
    }

    .orb2 {
      width: 110px;
      height: 110px;
      background: #00a651;
      top: 12%;
      left: 15%;
      animation: floatTwo 10s ease-in-out infinite;
    }

    .shell {
      width: 100%;
      max-width: 390px;
      position: relative;
      z-index: 2;
      animation: riseIn 1s ease;
    }

    .login-card {
      position: relative;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(255,255,255,0.35);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 34px 22px 22px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .top-band {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 110px;
      background: linear-gradient(90deg, #0b4a80 0%, #1e84db 70%, #00a651 100%);
      border-bottom-left-radius: 26px;
      border-bottom-right-radius: 26px;
      animation: shimmer 6s linear infinite;
      background-size: 200% 100%;
    }

    .security-badge {
      position: absolute;
      top: 14px;
      right: 16px;
      z-index: 3;
      font-size: 11px;
      font-weight: 700;
      color: #eaf7ff;
      background: rgba(255,255,255,0.14);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      animation: blinkSoft 2.2s ease-in-out infinite;
    }

    .logo-wrap {
      position: relative;
      z-index: 3;
      width: 86px;
      height: 86px;
      margin: 12px auto 18px;
      border-radius: 50%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid #eef7ff;
      box-shadow: 0 10px 24px rgba(9, 51, 92, 0.20);
      animation: iconPop 1s ease;
    }

    .logo-inner {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0b4a80, #1f86dd);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 26px;
      box-shadow: inset 0 0 14px rgba(255,255,255,0.12);
    }

    .title {
      position: relative;
      z-index: 3;
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      color: #0f2d4c;
      margin-bottom: 6px;
      animation: fadeSlide 0.9s ease;
    }

    .subtitle {
      position: relative;
      z-index: 3;
      text-align: center;
      color: #66788a;
      font-size: 14px;
      margin-bottom: 22px;
      animation: fadeSlide 1.1s ease;
    }

    .cyber-line {
      height: 4px;
      width: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #0b4a80, #1f86dd, #00a651, #1f86dd, #0b4a80);
      background-size: 200% 100%;
      margin-bottom: 18px;
      animation: shimmer 4s linear infinite;
    }

    .input-group {
      margin-bottom: 14px;
      animation: fadeUp 0.9s ease;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #19456d;
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      border: 1px solid #d8e5f1;
      background: #f8fbff;
      border-radius: 16px;
      padding: 15px 14px 15px 44px;
      font-size: 15px;
      color: #12304e;
      outline: none;
      transition: 0.25s ease;
    }

    .input-wrap span {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0.8;
    }

    .input-wrap input:focus {
      border-color: #1d84dc;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(29, 132, 220, 0.12);
      transform: translateY(-1px);
    }

    .shield-box {
      margin: 4px 0 16px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      color: #52708c;
      flex-wrap: wrap;
      animation: fadeUp 1.15s ease;
    }

    .shield-chip {
      background: #f3f9ff;
      border: 1px solid #dbeaf8;
      padding: 7px 10px;
      border-radius: 999px;
      font-weight: 700;
    }

    .login-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 15px;
      background: linear-gradient(90deg, #0b4a80 0%, #1e84db 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(19, 93, 155, 0.22);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      animation: fadeUp 1.2s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 16px 26px rgba(19, 93, 155, 0.28);
      opacity: 0.98;
    }

    .login-btn:active {
      transform: scale(0.99);
    }

    .message {
      min-height: 20px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      margin-top: 14px;
      animation: fadeUp 1.3s ease;
    }

    .bottom-tools {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      animation: fadeUp 1.35s ease;
    }

    .tool-card {
      background: #f6fbff;
      border: 1px solid #dcebf8;
      border-radius: 16px;
      padding: 14px 10px;
      text-align: center;
      color: #1c4d78;
      font-size: 13px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .tool-card:hover {
      transform: translateY(-2px);
      background: #eef7ff;
    }

    .footer-note {
      text-align: center;
      margin-top: 16px;
      color: #e7f2ff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.4px;
      animation: fadeSlide 1.5s ease;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes iconPop {
      0% {
        opacity: 0;
        transform: scale(0.75) translateY(10px);
      }
      70% {
        transform: scale(1.06) translateY(0);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: 0% 50%;
      }
      100% {
        background-position: 200% 50%;
      }
    }

    @keyframes gridMove {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(40px);
      }
    }

    @keyframes pulseGlow {
      0%, 100% {
        transform: scale(1);
        opacity: 0.22;
      }
      50% {
        transform: scale(1.08);
        opacity: 0.34;
      }
    }

    @keyframes floatOne {
      0%, 100% {
        transform: translateY(0) translateX(0);
      }
      50% {
        transform: translateY(-20px) translateX(12px);
      }
    }

    @keyframes floatTwo {
      0%, 100% {
        transform: translateY(0) translateX(0);
      }
      50% {
        transform: translateY(16px) translateX(-10px);
      }
    }

    @keyframes blinkSoft {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }

    @media (max-width: 420px) {
      .login-card {
        padding: 30px 18px 20px;
      }

      .title {
        font-size: 23px;
      }

      .bottom-tools {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="floating-orb orb1"></div>
  <div class="floating-orb orb2"></div>

  <div class="shell">
    <div class="login-card">
      <div class="top-band"></div>
      <div class="security-badge">CYBERSECURE</div>

      <div class="logo-wrap">
        <div class="logo-inner">🏦</div>
      </div>

      <h1 class="title">Secure Login</h1>
      <p class="subtitle">Protected banking access with encrypted sign-in layers.</p>

      <div class="cyber-line"></div>

      <div class="input-group">
        <label for="username">Username</label>
        <div class="input-wrap">
          <span>👤</span>
          <input type="text" id="username" placeholder="Enter username" maxlength="30" />
        </div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span>🔒</span>
          <input type="password" id="password" placeholder="Enter password" maxlength="64" />
        </div>
      </div>

      <div class="shield-box">
        <div class="shield-chip">🛡 Protected</div>
        <div class="shield-chip">🔐 Encrypted</div>
        <div class="shield-chip">⚡ Secure Session</div>
      </div>

      <button class="login-btn" onclick="login()">Login</button>

      <div id="message" class="message"></div>

      <div class="bottom-tools">
        <div class="tool-card">Fraud Shield</div>
        <div class="tool-card">Safe Access</div>
      </div>
    </div>

    <div class="footer-note">CUSTOM BANKING PORTAL</div>
  </div>

  <script>
    function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("message");

      if (username === "admin" && password === "SecurePass123") {
        message.style.color = "#149c55";
        message.textContent = "Login successful";
      } else {
        message.style.color = "#d62828";
        message.textContent = "Invalid username or password";
      }
    }
  </script>
</body>
</html>
