<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bank App UI</title>
  <style>
    :root {
      --bg: #f2f2f2;
      --surface: #ffffff;
      --text: #111111;
      --muted: #6f6f6f;
      --line: #d7d7d7;
      --teal: #0aa8ad;
      --teal-2: #8dd3d6;
      --orange: #ef9627;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #e8e8e8;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      min-height: 100%;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      overflow-x: hidden;
      padding-bottom: calc(92px + env(safe-area-inset-bottom));
    }

    .topbar {
      height: 82px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 22px 18px;
      background: #fff;
    }

    .brand {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .qr {
      width: 28px;
      height: 28px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3px;
      flex: 0 0 auto;
    }

    .qr span {
      border: 2.5px solid #111;
      border-radius: 1px;
      background: #fff;
    }

    .hero {
      height: 220px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 55%, rgba(255,255,255,.34), transparent 28%),
        radial-gradient(circle at 82% 24%, rgba(255,255,255,.18), transparent 18%),
        linear-gradient(135deg, #8bd0d4 0%, #9cdbde 42%, #63bec6 100%);
      border-top: 1px solid rgba(0,0,0,.04);
    }

    .hero-header {
      position: absolute;
      top: 16px;
      left: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 2;
    }

    .circle-logo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 4px solid var(--teal);
      background: #efb030;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .circle-logo::before {
      content: "";
      width: 18px;
      height: 18px;
      border: 3.5px solid #111;
      border-left-color: transparent;
      border-top-color: transparent;
      border-radius: 50%;
      transform: rotate(45deg);
      position: absolute;
    }

    .divider {
      width: 2px;
      height: 30px;
      background: rgba(0,0,0,.3);
    }

    .speed-stripe {
      width: 32px;
      height: 16px;
      transform: skewX(-28deg);
      background: linear-gradient(135deg, #0f95a7 0 50%, #f0aa33 50% 100%);
      border-radius: 2px;
      margin-right: -2px;
    }

    .hero-title {
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hero-title small {
      font-size: 11px;
    }

    .intro-card {
      position: absolute;
      left: 16px;
      top: 94px;
      width: min(60vw, 250px);
      max-width: 250px;
      height: 138px;
      border-radius: 22px;
      border: 3px solid #259fb2;
      background: linear-gradient(90deg, rgba(8,171,191,.92), rgba(189,240,242,.82));
      box-shadow: inset 0 0 34px rgba(255,255,255,.18);
      padding: 17px 18px;
      z-index: 1;
    }

    .intro-card .big {
      font-size: clamp(23px, 4.3vw, 28px);
      line-height: 1.03;
      font-weight: 400;
      letter-spacing: -.3px;
    }

    .intro-card .big strong {
      font-weight: 800;
      font-size: clamp(25px, 4.8vw, 31px);
    }

    .devices {
      position: absolute;
      right: -8px;
      top: 18px;
      width: min(54vw, 220px);
      height: 188px;
      z-index: 2;
    }

    .screen, .device, .monitor, .mini-device {
      position: absolute;
      background: #f8fbfc;
      border: 2px solid #212a2d;
      box-shadow: 0 10px 22px rgba(0,0,0,.16);
      overflow: hidden;
    }

    .screen::before, .device::before, .monitor::before, .mini-device::before {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 8px;
      background: linear-gradient(180deg, #fdfefe 0%, #eef5f6 100%);
    }

    .screen {
      width: 156px;
      height: 96px;
      right: 22px;
      top: 5px;
      border-radius: 10px;
      transform: rotate(-9deg) scale(.94);
      transform-origin: center;
    }

    .screen::after {
      content: "";
      position: absolute;
      inset: 14px;
      background:
        linear-gradient(#d8ecef 0 0) 0 0/100% 12px no-repeat,
        linear-gradient(#c7dfe2 0 0) 10px 24px/22px 8px no-repeat,
        linear-gradient(#c7dfe2 0 0) 46px 24px/22px 8px no-repeat,
        linear-gradient(#c7dfe2 0 0) 82px 24px/22px 8px no-repeat,
        linear-gradient(#a2d5d8 0 0) 10px 44px/48px 26px no-repeat,
        linear-gradient(#e6efef 0 0) 64px 44px/56px 26px no-repeat;
      border-radius: 6px;
    }

    .device {
      width: 55px;
      height: 103px;
      right: 109px;
      bottom: 2px;
      border-radius: 10px;
      transform: rotate(-7deg) scale(.94);
      transform-origin: center;
    }

    .device::after {
      content: "";
      position: absolute;
      inset: 12px 10px 14px;
      background:
        linear-gradient(#38c36d 0 0) 0 0/100% 16px no-repeat,
        linear-gradient(#735cff 0 0) 0 22px/18px 16px no-repeat,
        linear-gradient(#f3a12b 0 0) 23px 22px/18px 16px no-repeat,
        linear-gradient(#13a8ad 0 0) 0 43px/18px 16px no-repeat,
        linear-gradient(#f06b6b 0 0) 23px 43px/18px 16px no-repeat;
      border-radius: 8px;
    }

    .mini-device {
      width: 42px;
      height: 84px;
      right: 149px;
      bottom: 6px;
      border-radius: 10px;
      transform: rotate(11deg) scale(.94);
      transform-origin: center;
    }

    .mini-device::after {
      content: "";
      position: absolute;
      inset: 12px 8px 14px;
      background:
        linear-gradient(#ffffff 0 0) 0 0/100% 50px no-repeat,
        linear-gradient(#efaa2c 0 0) 0 56px/100% 10px no-repeat;
      border-radius: 6px;
    }

    .monitor {
      width: 126px;
      height: 88px;
      right: 2px;
      bottom: 0;
      border-radius: 8px;
      transform: rotate(2deg) scale(.94);
      transform-origin: center;
    }

    .monitor::after {
      content: "";
      position: absolute;
      inset: 12px 10px;
      background:
        linear-gradient(#dcecef 0 0) 0 0/100% 12px no-repeat,
        linear-gradient(#89c9cf 0 0) 10px 26px/42px 4px no-repeat,
        linear-gradient(#89c9cf 0 0) 10px 34px/54px 4px no-repeat,
        linear-gradient(#89c9cf 0 0) 10px 42px/34px 4px no-repeat,
        linear-gradient(#e6efef 0 0) 72px 24px/30px 24px no-repeat;
      border-radius: 6px;
    }

    .printer {
      position: absolute;
      right: 14px;
      top: 108px;
      width: 42px;
      height: 22px;
      background: linear-gradient(180deg, #1ab2be, #0a9fa7);
      border: 2px solid #233237;
      border-radius: 8px;
      transform: rotate(-14deg);
      box-shadow: 0 8px 16px rgba(0,0,0,.14);
    }

    .checkout {
      position: absolute;
      right: 20px;
      top: 118px;
      background: var(--orange);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 4px;
      transform: rotate(-8deg);
      box-shadow: 0 4px 10px rgba(0,0,0,.14);
    }

    .content {
      padding: 18px 16px 0;
    }

    .search {
      height: 72px;
      background: #fff;
      border: 2px solid var(--line);
      border-radius: 30px;
      display: flex;
      align-items: center;
      overflow: hidden;
      box-shadow: 0 1px 0 rgba(255,255,255,.8) inset;
    }

    .search-left {
      width: 88px;
      height: 100%;
      background: var(--teal);
      border-top-right-radius: 20px;
      border-bottom-right-radius: 20px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .glass {
      width: 32px;
      height: 32px;
      border: 4px solid #fff;
      border-radius: 50%;
      position: relative;
    }

    .glass::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 4px;
      border-radius: 4px;
      background: #fff;
      right: -8px;
      bottom: 1px;
      transform: rotate(45deg);
    }

    .search-text {
      padding-left: 18px;
      padding-right: 10px;
      font-size: clamp(19px, 5vw, 27px);
      color: #787878;
      letter-spacing: -.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 20px 12px;
      align-items: start;
    }

    .tile {
      text-align: center;
    }

    .tile-btn {
      appearance: none;
      border: 0;
      background: transparent;
      width: 100%;
      padding: 0;
      margin: 0;
      cursor: pointer;
      font: inherit;
      color: inherit;
      display: block;
    }

    .tile-btn:focus-visible {
      outline: 3px solid rgba(10,168,173,.25);
      outline-offset: 4px;
      border-radius: 24px;
    }

    .tile-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      margin: 0 auto 10px;
      border: 2px solid #d8d8d8;
      background: #fff;
      border-radius: 22px;
      display: grid;
      place-items: center;
      box-shadow: 0 1px 0 rgba(255,255,255,.9) inset;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      min-height: 76px;
      max-width: 94px;
    }

    .tile-btn:hover .tile-box {
      box-shadow: var(--shadow);
      border-color: #cecece;
    }

    .tile-btn:active .tile-box,
    .tile-btn.is-active .tile-box {
      transform: scale(.97);
      box-shadow: 0 6px 18px rgba(0,0,0,.10);
      border-color: #cfcfcf;
    }

    .tile-label {
      font-size: clamp(14px, 3.8vw, 19px);
      line-height: 1.1;
      letter-spacing: -.2px;
      min-height: 2.3em;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-align: center;
      color: #141414;
    }

    .icon svg {
      width: min(42px, 55%);
      height: min(42px, 55%);
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon.orange svg { stroke: var(--orange); }
    .icon.teal svg { stroke: var(--teal); }

    .panel {
      margin-top: 18px;
      background: var(--surface);
      border: 1px solid #dfdfdf;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 8px 22px rgba(0,0,0,.04);
    }

    .panel-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .panel-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .bottom {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 100%;
      max-width: 430px;
      background: #fff;
      border-top: 1px solid #d8d8d8;
      padding: 12px 8px calc(14px + env(safe-area-inset-bottom));
      z-index: 30;
    }

    .active-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 74px;
      height: 4px;
      background: #111;
      border-radius: 0 0 4px 0;
    }

    .nav {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      text-align: center;
      align-items: end;
      gap: 2px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      font-size: 12px;
      letter-spacing: -.1px;
      color: #111;
      text-decoration: none;
      padding: 4px 2px 0;
      cursor: pointer;
    }

    .nav-item svg {
      width: 29px;
      height: 29px;
      stroke: #111;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      margin-bottom: 8px;
    }

    .nav-item:active {
      opacity: .78;
    }

    @media (max-width: 380px) {
      .topbar { padding-left: 18px; padding-right: 18px; }
      .content { padding-left: 12px; padding-right: 12px; }
      .grid { gap: 18px 10px; }
      .hero { height: 208px; }
      .intro-card { left: 12px; width: min(58vw, 225px); height: 128px; }
      .devices { transform: scale(.9); transform-origin: top right; right: -18px; }
      .search-left { width: 78px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">#</div>
      <div class="qr" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
    </div>

    <section class="hero">
      <div class="hero-header">
        <div class="circle-logo"></div>
        <div class="divider"></div>
        <div class="speed-stripe"></div>
        <div class="hero-title">Speedpoint<small>®</small></div>
      </div>

      <div class="intro-card">
        <div class="big">Introducing<br>our <strong>NEW</strong><br><strong>Speedpoint</strong><sup style="font-size:13px;">®</sup><br>range</div>
      </div>

      <div class="devices" aria-hidden="true">
        <div class="screen"></div>
        <div class="mini-device"></div>
        <div class="device"></div>
        <div class="monitor"></div>
        <div class="printer"></div>
        <div class="checkout">Checkout R35.00</div>
      </div>
    </section>

    <main class="content">
      <div class="search" role="button" tabindex="0" aria-label="Search help options">
        <div class="search-left">
          <div class="glass"></div>
        </div>
        <div class="search-text">How can we help you?</div>
      </div>

      <section class="grid" aria-label="Quick actions">
        <div class="tile">
          <button class="tile-btn" data-panel="login">
            <div class="tile-box"><div class="icon orange">
              <svg viewBox="0 0 24 24"><path d="M7 11V8a5 5 0 0 1 10 0v3"/><rect x="5" y="11" width="14" height="10" rx="2"/></svg>
            </div></div>
            <div class="tile-label">Login</div>
          </button>
        </div>

        <div class="tile">
          <button class="tile-btn" data-panel="message">
            <div class="tile-box"><div class="icon teal">
              <svg viewBox="0 0 24 24"><path d="M20 14a3 3 0 0 1-3 3H9l-4 3v-3a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3z"/></svg>
            </div></div>
            <div class="tile-label">Message</div>
          </button>
        </div>

        <div class="tile">
          <button class="tile-btn" data-panel="shop">
            <div class="tile-box"><div class="icon orange">
              <svg viewBox="0 0 24 24"><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/><path d="M3 4h2l2.2 9.2a1 1 0 0 0 1 .8h8.9a1 1 0 0 0 1-.7L21 8H7"/></svg>
            </div></div>
            <div class="tile-label">Product<br>Shop</div>
          </button>
        </div>

        <div class="tile">
          <button class="tile-btn" data-panel="pay">
            <div class="tile-box"><div class="icon teal">
              <svg viewBox="0 0 24 24"><path d="M3 14c2.5 0 4.4-3 7-3 1.4 0 2.2.6 3 1.5"/><path d="M10 18h6.3c1.4 0 2.7-.7 3.5-1.8l1.2-1.7a1.5 1.5 0 0 0-2.1-2.1l-1.3 1.1H14"/><rect x="2" y="13" width="4" height="7" rx="1"/></svg>
            </div></div>
            <div class="tile-label">Pay</div>
          </button>
        </div>

        <div class="tile">
          <button class="tile-btn" data-panel="transfer">
            <div class="tile-box"><div class="icon teal">
              <svg viewBox="0 0 24 24"><path d="M7 7h10"/><path d="M13 3l4 4-4 4"/><path d="M17 17H7"/><path d="M11 21l-4-4 4-4"/></svg>
            </div></div>
            <div class="tile-label">Transfer</div>
          </button>
        </div>

        <div class="tile">
          <button class="tile-btn" data-panel="gift">
            <div class="tile-box"><div class="icon orange">
              <svg viewBox="0 0 24 24"><path d="M20 12v8H4v-8"/><path d="M2 7h20v5H2z"/><path d="M12 7v13"/><path d="M12 7c-1.7 0-4-1-4-3a2 2 0 0 1 4 0"/><path d="M12 7c1.7 0 4-1 4-3a2 2 0 0 0-4 0"/></svg>
            </div></div>
            <div class="tile-label">Buy + Gift</div>
          </button>
        </div>

        <div class="tile">
          <button class="tile-btn" data-panel="vouchers">
            <div class="tile-box"><div class="icon teal">
              <svg viewBox="0 0 24 24"><path d="M3 8a2 2 0 0 1 2-2h14v12H5a2 2 0 0 1-2-2z"/><path d="M8 9l8 6"/><path d="M16 9l-8 6"/></svg>
            </div></div>
            <div class="tile-label">Vouchers</div>
          </button>
        </div>

        <div class="tile">
          <button class="tile-btn" data-panel="insure">
            <div class="tile-box"><div class="icon teal">
              <svg viewBox="0 0 24 24"><path d="M12 3l7 4v5c0 5-3.4 8-7 9-3.6-1-7-4-7-9V7z"/><circle cx="12" cy="12" r="3"/></svg>
            </div></div>
            <div class="tile-label">Insure</div>
          </button>
        </div>
      </section>

      <section class="panel" id="info-panel" aria-live="polite">
        <div class="panel-title">Welcome</div>
        <div class="panel-text">Tap any tile to preview that section. The layout is tuned for mobile screens so all quick actions sit neatly on one screen without spilling over like dropped groceries.</div>
      </section>
    </main>

    <nav class="bottom">
      <div class="active-line"></div>
      <div class="nav">
        <a class="nav-item" href="#" aria-label="Home">
          <svg viewBox="0 0 24 24"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
          <div>Home</div>
        </a>
        <a class="nav-item" href="#" aria-label="Bank">
          <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M3 10h18"/></svg>
          <div>Bank</div>
        </a>
        <a class="nav-item" href="#" aria-label="Message">
          <svg viewBox="0 0 24 24"><path d="M20 14a3 3 0 0 1-3 3H9l-4 3v-3a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3z"/></svg>
          <div>Message</div>
        </a>
        <a class="nav-item" href="#" aria-label="My profile">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
          <div>My profile</div>
        </a>
        <a class="nav-item" href="#" aria-label="Menu">
          <svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg>
          <div>Menu</div>
        </a>
      </div>
    </nav>
  </div>

  <script>
    const panel = document.getElementById('info-panel');
    const content = {
      login: {
        title: 'Login',
        text: 'Secure sign-in for banking, account access, and profile verification.'
      },
      message: {
        title: 'Message',
        text: 'View notifications, service updates, and secure in-app communication.'
      },
      shop: {
        title: 'Product Shop',
        text: 'Browse point-of-sale devices, business tools, and merchant services.'
      },
      pay: {
        title: 'Pay',
        text: 'Make payments quickly using saved beneficiaries or once-off options.'
      },
      transfer: {
        title: 'Transfer',
        text: 'Move money between accounts with a clean, guided payment flow.'
      },
      gift: {
        title: 'Buy + Gift',
        text: 'Purchase vouchers, airtime, and digital products for yourself or someone else.'
      },
      vouchers: {
        title: 'Vouchers',
        text: 'Access digital voucher services with clear balances and purchase history.'
      },
      insure: {
        title: 'Insure',
        text: 'Manage cover, view policy details, and check insurance products in one place.'
      }
    };

    const buttons = document.querySelectorAll('.tile-btn');
    buttons.forEach((btn) => {
      btn.addEventListener('click', () => {
        buttons.forEach((b) => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        const key = btn.dataset.panel;
        const item = content[key];
        panel.innerHTML = `\n          <div class="panel-title">${item.title}</div>\n          <div class="panel-text">${item.text}</div>\n        `;
      });
    });
  </script>
</body>
</html>
